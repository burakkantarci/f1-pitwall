apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: pitwall
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U pitwall; do
                echo "Waiting for postgres..."
                sleep 2
              done
              PGPASSWORD="$POSTGRES_PASSWORD" psql -h postgres -U pitwall -d pitwall -f /migrations/001_initial.sql
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pitwall-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: db-migrations
