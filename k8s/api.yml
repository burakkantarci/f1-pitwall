apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: pitwall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: pitwall-api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: SERVICE_NAME
              value: pitwall-api
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: pitwall-config
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: pitwall-config
                  key: REDIS_URL
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: pitwall-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: INGESTION_URL
              valueFrom:
                configMapKeyRef:
                  name: pitwall-config
                  key: INGESTION_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: pitwall
spec:
  type: NodePort
  selector:
    app: api
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 30001
