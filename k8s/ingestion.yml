apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: pitwall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      containers:
        - name: ingestion
          image: pitwall-ingestion:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: SERVICE_NAME
              value: pitwall-ingestion
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: pitwall-config
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: pitwall-config
                  key: REDIS_URL
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: pitwall-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OPENF1_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: pitwall-config
                  key: OPENF1_BASE_URL
            - name: ERGAST_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: pitwall-config
                  key: ERGAST_BASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion
  namespace: pitwall
spec:
  type: NodePort
  selector:
    app: ingestion
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
