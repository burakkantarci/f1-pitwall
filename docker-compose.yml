services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pitwall
      POSTGRES_USER: pitwall
      POSTGRES_PASSWORD: pitwall_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitwall"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./services/api
    ports:
      - "3001:3001"
    environment:
      - SERVICE_NAME=pitwall-api
      - PORT=3001
      - DATABASE_URL=postgresql://pitwall:pitwall_dev@postgres:5432/pitwall
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingestion:
    build: ./services/ingestion
    environment:
      - SERVICE_NAME=pitwall-ingestion
      - DATABASE_URL=postgresql://pitwall:pitwall_dev@postgres:5432/pitwall
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OPENF1_BASE_URL=https://api.openf1.org/v1
      - ERGAST_BASE_URL=https://api.jolpi.ca/ergast/f1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notifications:
    build: ./services/notifications
    environment:
      - SERVICE_NAME=pitwall-notifications
      - REDIS_URL=redis://redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
      - VITE_WS_URL=ws://localhost:3001

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"

volumes:
  postgres_data:
