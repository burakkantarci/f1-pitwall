receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  logging:
    loglevel: info

  # Uncomment and configure as needed:
  # otlp/elastic:
  #   endpoint: "your-elastic-apm-endpoint:443"
  #   headers:
  #     Authorization: "Bearer your-token"
  #
  # datadog:
  #   api:
  #     key: "${DD_API_KEY}"
  #
  # otlp/grafana:
  #   endpoint: "your-grafana-otlp-endpoint"
  #   headers:
  #     Authorization: "Basic your-token"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
